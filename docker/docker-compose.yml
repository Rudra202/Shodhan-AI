version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shodhan-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shodhan_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../server
      dockerfile: ../docker/backend.Dockerfile
    container_name: shodhan-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/shodhan_ai?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../server:/app
      - /app/node_modules

  frontend:
    build:
      context: ../client
      dockerfile: ../docker/frontend.Dockerfile
    container_name: shodhan-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
